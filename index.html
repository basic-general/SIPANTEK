<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIPANTEK — Sistem Pelaporan Environmental Terkini</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     SIPANTEK design tokens — instrument-panel aesthetic.
     Inspired by CEMS readouts, gauge faces, and field data sheets.
     Palette: deep ink-green panel, teal signal, amber/red alert lamps.
     Type: IBM Plex Mono for numerals/labels (instrument feel),
           Inter for body/forms (legibility).
     ============================================================ */
  :root {
    --bg-canvas: #F3F6F4;
    --bg-panel: #FFFFFF;
    --bg-panel-raised: #F3F8F5;
    --bg-well: #F1F5F2;
    --bg-input: #FFFFFF;
    --bg-info: #E9F1FE;
    --bg-success: #E7F7EF;
    --bg-danger: #FDEDEC;
    --bg-amber: #FDF3E0;
    --text-primary: #0E2019;
    --text-secondary: #4B6157;
    --text-tertiary: #8CA097;
    --text-info: #2563EB;
    --text-success: #0B7C72;
    --text-danger: #C7362F;
    --text-amber: #9C6203;
    --border-hairline: rgba(16,42,34,0.08);
    --border-subtle: rgba(16,42,34,0.13);
    --border-strong: rgba(16,42,34,0.20);
    --border-info: #0D9488;
    --signal-teal: #0D9488;
    --signal-amber: #E2A030;
    --signal-red: #E0524F;
    --shadow-sm: 0 1px 2px rgba(14,32,25,0.05);
    --shadow-md: 0 2px 8px rgba(14,32,25,0.06), 0 1px 2px rgba(14,32,25,0.04);
    --shadow-lg: 0 12px 32px rgba(14,32,25,0.14), 0 2px 8px rgba(14,32,25,0.06);
    --radius-sm: 6px;
    --radius-md: 8px;
    --radius-lg: 14px;
    --radius-xl: 18px;
    --font-mono: 'IBM Plex Mono', 'SF Mono', Consolas, monospace;
    --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }

  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: var(--font-sans); background: var(--bg-canvas);
    color: var(--text-primary); line-height: 1.55; -webkit-font-smoothing: antialiased;
  }
  #app { max-width: 800px; margin: 0 auto; padding: 1.25rem 1rem 4rem; }
  @media (min-width: 1080px) { #app { max-width: 1040px; } }
  @media (min-width: 1440px) { #app { max-width: 1180px; } }
  h1, h2, h3 { font-weight: 600; margin: 0; font-family: var(--font-mono); letter-spacing: -0.01em; }
  h1 { font-size: 22px; } h2 { font-size: 17px; } h3 { font-size: 15px; }
  input, select, textarea, button {
    font-family: var(--font-sans); font-size: 14px; color: var(--text-primary);
    background: var(--bg-input); border: 1px solid var(--border-subtle);
    border-radius: var(--radius-md); padding: 9px 12px; outline: none;
    transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
  }
  input, select, textarea { width: 100%; }
  input:hover, select:hover, textarea:hover { border-color: var(--border-strong); }
  input:focus, select:focus, textarea:focus { border-color: var(--signal-teal); box-shadow: 0 0 0 3px rgba(13,148,136,0.16); }
  button { cursor: pointer; font-weight: 500; min-height: 36px; transition: background 0.15s, transform 0.05s, border-color 0.15s, box-shadow 0.15s; }
  button:hover { background: var(--bg-panel-raised); border-color: var(--border-strong); }
  button:active { transform: scale(0.98); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button:focus-visible, .icon-btn:focus-visible, [tabindex]:focus-visible { box-shadow: 0 0 0 3px rgba(13,148,136,0.28); border-color: var(--signal-teal); }
  button.primary { background: var(--signal-teal); color: #FFFFFF; border-color: var(--signal-teal); font-weight: 600; box-shadow: var(--shadow-sm); }
  button.primary:hover { background: #0B7C72; border-color: #0B7C72; box-shadow: var(--shadow-md); }
  button.success-btn { background: var(--text-success); color: #FFFFFF; border-color: var(--text-success); font-weight: 600; }
  button.success-btn:hover { background: #0A6D64; }
  button.ghost { border: 1px solid var(--border-subtle); background: var(--bg-input); padding: 6px 10px; color: var(--text-secondary); }
  button.ghost:hover { background: var(--bg-panel-raised); color: var(--text-primary); border-color: var(--border-strong); }
  .icon-btn { display: inline-flex; align-items: center; justify-content: center; width: 32px; height: 32px; padding: 0; min-height: 0; border: 1px solid transparent; background: transparent; color: var(--text-tertiary); border-radius: var(--radius-sm); }
  .icon-btn:hover { background: var(--bg-panel-raised); color: var(--text-primary); border-color: var(--border-hairline); }
  .icon-svg { display: inline-block; }
  button .icon-svg, .freq-pill .icon-svg, .alert .icon-svg, .eyebrow .icon-svg { vertical-align: -3px; }
  .row { display: flex; align-items: center; gap: 8px; }
  .between { display: flex; justify-content: space-between; align-items: center; }
  .muted { color: var(--text-secondary); }
  .tiny { font-size: 12px; }
  .small { font-size: 13px; }
  .mono { font-family: var(--font-mono); }
  .card { background: var(--bg-panel); border: 1px solid var(--border-hairline); border-radius: var(--radius-lg); padding: 1.1rem 1.3rem; box-shadow: var(--shadow-sm); }
  .badge { font-size: 11px; padding: 3px 9px; border-radius: 999px; font-weight: 600; white-space: nowrap; font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.04em; border: 1px solid transparent; }
  .proj-card { position: relative; background: var(--bg-panel); border: 1px solid var(--border-hairline); border-left: 3px solid var(--row-accent, var(--border-hairline)); border-radius: var(--radius-lg); padding: 1.1rem 1.3rem 1.1rem 1.2rem; cursor: pointer; transition: border-color 0.15s, transform 0.1s, box-shadow 0.15s, background 0.15s; box-shadow: var(--shadow-sm); min-height: 44px; }
  .proj-card:hover { border-color: var(--border-strong); background: var(--bg-panel-raised); transform: translateX(2px); box-shadow: var(--shadow-md); }
  .proj-card:focus-visible { outline: none; border-color: var(--signal-teal); background: var(--bg-panel-raised); box-shadow: 0 0 0 3px rgba(13,148,136,0.24), var(--shadow-md); }
  .proj-card:active { transform: translateX(2px) scale(0.995); }
  .kbd-hint { display: none; align-items: center; gap: 3px; margin-left: auto; }
  @media (min-width: 700px) { .kbd-hint { display: flex; } }
  .kbd { font-family: var(--font-mono); font-size: 10.5px; background: var(--bg-well); border: 1px solid var(--border-subtle); border-bottom-width: 2px; border-radius: 4px; padding: 1px 5px; color: var(--text-secondary); }
  .template-card { border: 1px solid var(--border-hairline); border-radius: var(--radius-lg); padding: 0.9rem 1rem; cursor: pointer; background: var(--bg-panel); transition: border-color 0.15s, box-shadow 0.15s; box-shadow: var(--shadow-sm); min-height: 44px; }
  .template-card:hover { border-color: var(--border-strong); box-shadow: var(--shadow-md); }
  .template-card.active { border-color: var(--signal-teal); box-shadow: 0 0 0 2px rgba(13,148,136,0.18); background: var(--bg-panel-raised); }
  .template-card i { font-size: 20px; color: var(--text-info); }
  .template-card .t-title { font-weight: 600; font-size: 14px; margin-top: 8px; font-family: var(--font-mono); }
  .template-card .t-sub { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
  .stage-card { background: var(--bg-panel); border: 1px solid var(--border-hairline); border-radius: var(--radius-lg); padding: 1rem 1.2rem; box-shadow: var(--shadow-sm); }
  .stage-name-input { font-weight: 600; font-size: 14px; border: none; background: transparent; padding: 4px 2px; font-family: var(--font-mono); border-radius: var(--radius-sm); }
  .stage-name-input:hover { background: var(--bg-panel-raised); }
  .weight-input { width: 68px; text-align: right; padding: 6px 8px; font-family: var(--font-mono); -moz-appearance: textfield; appearance: textfield; }
  .weight-input::-webkit-outer-spin-button, .weight-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .stage-date-input { width: 130px; padding: 6px 8px; font-size: 12.5px; }
  .task-row { display: flex; align-items: center; gap: 8px; min-height: 32px; }
  .task-block { padding-bottom: 4px; }
  .task-block + .task-block { border-top: 1px solid var(--border-hairline); padding-top: 8px; margin-top: 4px; }
  .task-row input[type=checkbox] { width: 18px; height: 18px; accent-color: var(--signal-teal); cursor: pointer; }
  .task-name { flex: 1; font-size: 13.5px; }
  .task-name.done { text-decoration: line-through; color: var(--text-tertiary); }
  .topbar { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 1.25rem; flex-wrap: wrap; gap: 12px; padding-bottom: 1rem; border-bottom: 1px solid var(--border-hairline); }
  .filters { display: flex; gap: 8px; margin-bottom: 0.85rem; flex-wrap: wrap; align-items: center; }
  .filters select { width: auto; font-family: var(--font-mono); font-size: 12.5px; }
  .empty-state { padding: 3.25rem 1.5rem; text-align: center; color: var(--text-secondary); background: var(--bg-panel); border: 1px dashed var(--border-subtle); border-radius: var(--radius-lg); font-size: 14px; }
  .empty-state .empty-icon { color: var(--text-tertiary); margin-bottom: 10px; }
  .empty-state .empty-title { color: var(--text-primary); font-weight: 600; font-size: 15px; margin-bottom: 4px; }
  .name-input-large { font-size: 20px; font-weight: 600; border: none; padding: 6px 4px; background: transparent; width: 100%; font-family: var(--font-mono); border-radius: var(--radius-sm); }
  .name-input-large:hover { background: var(--bg-panel-raised); }
  .meta-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; align-items: flex-end; }
  .meta-row select, .meta-row input { font-size: 13px; }
  .meta-field { display: flex; flex-direction: column; gap: 4px; width: 150px; flex-shrink: 0; }
  .meta-field select, .meta-field input { width: 100%; box-sizing: border-box; }
  .alert { font-size: 12.5px; color: var(--text-danger); margin-top: 10px; font-family: var(--font-mono); font-weight: 600; background: var(--bg-danger); border: 1px solid rgba(199,54,47,0.22); border-radius: var(--radius-sm); padding: 8px 10px; }
  .alert i { font-size: 13px; vertical-align: -2px; margin-right: 4px; }
  .top-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .logo-strip { display: flex; align-items: center; gap: 10px; padding-right: 12px; margin-right: 4px; border-right: 1px solid var(--border-hairline); }
  .logo-strip img { height: 26px; width: auto; display: block; }
  .logo-strip img.logo-perusahaan { height: 24px; }
  textarea { min-height: 76px; resize: vertical; }
  .sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; }

  /* Eyebrow / wordmark */
  .eyebrow { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-info); margin: 0 0 4px; display: flex; align-items: center; gap: 6px; }
  .eyebrow .dot { width: 6px; height: 6px; border-radius: 999px; background: var(--signal-teal); box-shadow: 0 0 0 3px rgba(13,148,136,0.18); }
  .wordmark { font-family: var(--font-mono); font-size: 26px; font-weight: 700; letter-spacing: -0.02em; }
  .wordmark .sub { display: block; font-family: var(--font-sans); font-weight: 400; font-size: 12.5px; color: var(--text-secondary); letter-spacing: 0; margin-top: 2px; }
  .tagline { margin: 3px 0 0; font-family: var(--font-mono); font-size: 11px; font-weight: 500; color: var(--text-tertiary); letter-spacing: 0.02em; }

  .tabs { display: flex; gap: 2px; background: var(--bg-well); border: 1px solid var(--border-hairline); border-radius: var(--radius-md); padding: 3px; margin-bottom: 1.5rem; width: fit-content; }
  .tab-btn { border: 1px solid transparent; background: transparent; padding: 8px 18px; min-height: 0; border-radius: var(--radius-sm); font-size: 12.5px; font-family: var(--font-mono); font-weight: 500; letter-spacing: 0.03em; text-transform: uppercase; color: var(--text-secondary); }
  .tab-btn:hover { background: rgba(16,42,34,0.04); color: var(--text-primary); }
  .tab-btn.active { background: var(--bg-panel); color: var(--signal-teal); border-color: var(--border-hairline); box-shadow: var(--shadow-sm); }

  .freq-pill { font-size: 10.5px; padding: 2px 7px; border-radius: 999px; background: var(--bg-well); color: var(--text-secondary); white-space: nowrap; font-family: var(--font-mono); border: 1px solid var(--border-hairline); text-transform: uppercase; letter-spacing: 0.03em; }
  .cycle-banner { display: flex; align-items: center; justify-content: space-between; gap: 12px; background: var(--bg-amber); border: 1px solid rgba(156,98,3,0.18); border-radius: var(--radius-md); padding: 11px 14px; margin-bottom: 1rem; flex-wrap: wrap; }
  .cycle-banner span { font-size: 12.5px; color: var(--text-amber); font-family: var(--font-mono); font-weight: 600; }
  .history-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-top: 1px solid var(--border-hairline); font-size: 13px; font-family: var(--font-mono); }
  .history-row:first-child { border-top: none; }
  .mode-toggle { display: flex; gap: 8px; }
  .mode-card { flex: 1; border: 1px solid var(--border-hairline); border-radius: var(--radius-md); padding: 11px 12px; cursor: pointer; font-size: 13px; background: var(--bg-panel); transition: border-color 0.15s, box-shadow 0.15s; min-height: 44px; box-shadow: var(--shadow-sm); }
  .mode-card:hover { border-color: var(--border-strong); }
  .mode-card.active { border-color: var(--signal-teal); box-shadow: 0 0 0 2px rgba(13,148,136,0.18); background: var(--bg-panel-raised); }
  .simple-done-card { display: flex; align-items: center; justify-content: space-between; background: var(--bg-panel); border: 1px solid var(--border-hairline); border-radius: var(--radius-lg); padding: 1.5rem; gap: 16px; box-shadow: var(--shadow-sm); }

  .sync-status { display: flex; align-items: center; gap: 6px; font-size: 11.5px; color: var(--text-secondary); font-family: var(--font-mono); }
  .sync-dot { width: 7px; height: 7px; border-radius: 999px; background: var(--text-tertiary); flex-shrink: 0; }
  .sync-dot.synced { background: var(--signal-teal); box-shadow: 0 0 0 3px rgba(13,148,136,0.18); }
  .sync-dot.syncing { background: var(--text-info); animation: pulse 1s infinite; }
  .sync-dot.error { background: var(--signal-red); box-shadow: 0 0 0 3px rgba(224,82,79,0.18); }
  .sync-dot.offline { background: var(--text-tertiary); }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.25; } }
  .setup-screen { max-width: 480px; margin: 3rem auto; text-align: center; }
  .setup-screen .card { text-align: left; }

  /* ---- Modal ---- */
  .modal-overlay { position: fixed; inset: 0; background: rgba(8,16,13,0.55); backdrop-filter: blur(3px); display: flex; align-items: center; justify-content: center; z-index: 50; padding: 16px; animation: modal-fade 0.18s ease-out; }
  .modal-box { background: var(--bg-panel); border: 1px solid var(--border-hairline); border-radius: var(--radius-xl); padding: 1.6rem; max-width: 460px; width: 100%; max-height: 85vh; overflow-y: auto; box-shadow: var(--shadow-lg); animation: modal-rise 0.2s cubic-bezier(.16,1,.3,1); }
  @keyframes modal-fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes modal-rise { from { opacity: 0; transform: translateY(8px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
  .step-num { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; border-radius: var(--radius-sm); background: var(--bg-well); border: 1px solid var(--border-hairline); color: var(--text-info); font-size: 11px; font-weight: 600; flex-shrink: 0; font-family: var(--font-mono); }

  /* ---- Signature element: gauge-style level meter (smooth, calm fill) ---- */
  .gauge { position: relative; width: 100%; height: 16px; background: var(--bg-well); border: 1px solid var(--border-hairline); border-radius: 999px; overflow: hidden; }
  .gauge-ticks { display: none; }
  .gauge-fill { position: absolute; left: 0; top: 0; bottom: 0; border-radius: 999px; transition: width 0.5s cubic-bezier(.4,0,.2,1); background: linear-gradient(90deg, var(--g-color) 0%, var(--g-color-2) 100%); }
  .gauge-readout { font-family: var(--font-mono); font-weight: 700; font-variant-numeric: tabular-nums; }
  .gauge-sm { height: 7px; }
  .gauge-sm .gauge-fill { background: var(--g-color); }

  /* Metric readout cards (dashboard) */
  .metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 1px; margin-bottom: 1.1rem; background: var(--border-hairline); border: 1px solid var(--border-hairline); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-sm); }
  .metric-card { background: var(--bg-panel); padding: 1rem 1.1rem; }
  .metric-card .lbl { font-size: 10.5px; color: var(--text-secondary); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.06em; margin: 0; }
  .metric-card .val { font-size: 27px; font-weight: 700; margin-top: 6px; font-family: var(--font-mono); font-variant-numeric: tabular-nums; color: var(--text-primary); line-height: 1; }
  .metric-card .val.accent { color: var(--signal-teal); }
  .recap-row { display: flex; align-items:center; gap: 14px; padding: 0.75rem 1rem; }
  .recap-row.bordered { border-bottom: 1px solid var(--border-hairline); }

  ::placeholder { color: var(--text-tertiary); }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: var(--bg-canvas); }
  ::-webkit-scrollbar-thumb { background: var(--bg-panel-raised); border-radius: 5px; border: 2px solid var(--bg-canvas); }

  @media (prefers-reduced-motion: reduce) {
    .sync-dot.syncing { animation: none; }
    .gauge-fill, .proj-card, .modal-overlay, .modal-box { transition: none; animation: none; }
  }

/* Fresh UI override — keeps original data and JS logic intact */
:root {
  --bg-canvas: #f7f9fc;
  --bg-panel: rgba(255,255,255,0.92);
  --bg-panel-raised: #f3f7fb;
  --bg-well: #eef3f7;
  --bg-input: #ffffff;
  --text-primary: #102033;
  --text-secondary: #516173;
  --text-tertiary: #8b9bad;
  --signal-teal: #14b8a6;
  --signal-amber: #f59e0b;
  --signal-red: #ef4444;
  --border-hairline: rgba(15, 23, 42, 0.07);
  --border-subtle: rgba(15, 23, 42, 0.12);
  --border-strong: rgba(15, 23, 42, 0.22);
  --shadow-sm: 0 1px 2px rgba(15,23,42,0.04);
  --shadow-md: 0 10px 30px rgba(15,23,42,0.08);
  --shadow-lg: 0 22px 60px rgba(15,23,42,0.16);
  --radius-sm: 10px;
  --radius-md: 14px;
  --radius-lg: 20px;
  --radius-xl: 28px;
}
body {
  background:
    radial-gradient(circle at top left, rgba(20,184,166,0.16), transparent 34rem),
    linear-gradient(180deg, #fbfdff 0%, var(--bg-canvas) 42%, #eef3f8 100%);
  color: var(--text-primary);
}
#app { max-width: 1180px; padding: 28px 18px 56px; }
h1 { font-size: clamp(26px, 3vw, 42px); letter-spacing: -0.045em; }
h2 { font-size: 20px; letter-spacing: -0.025em; }
h3 { font-size: 16px; }
.card, .panel, .simple-done-card, .stage-card, .modal-box, .proj-card {
  background: var(--bg-panel);
  border: 1px solid var(--border-hairline);
  box-shadow: var(--shadow-md);
  backdrop-filter: blur(14px);
}
.card:hover, .proj-card:hover, .stage-card:hover { border-color: rgba(20,184,166,0.26); }
.metric-grid {
  gap: 14px;
  background: transparent;
  border: 0;
  box-shadow: none;
}
.metric-card {
  border: 1px solid var(--border-hairline);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
}
.metric-card .val { font-size: 34px; letter-spacing: -0.04em; }
button, input, select, textarea, .mode-card { border-radius: var(--radius-md); }
button.primary, button.success-btn {
  background: linear-gradient(135deg, #14b8a6, #0ea5e9);
  border: 0;
  color: white;
  box-shadow: 0 12px 26px rgba(14,165,233,0.22);
}
button.primary:hover, button.success-btn:hover {
  background: linear-gradient(135deg, #0faaa0, #0284c7);
}
button.ghost, .icon-btn { background: rgba(255,255,255,0.7); }
input:focus, select:focus, textarea:focus {
  border-color: #14b8a6;
  box-shadow: 0 0 0 4px rgba(20,184,166,0.15);
}
.badge, .status-pill, .freq-pill { border-radius: 999px; }
.badge, .status-pill.done, .freq-pill.active {
  background: rgba(20,184,166,0.12);
  color: #0f766e;
}
.gauge { height: 18px; background: #e8eef5; }
.gauge-fill { background: linear-gradient(90deg, #14b8a6, #0ea5e9); }
.tab-item.active { color: #0f766e; border-bottom-color: #14b8a6; }
.modal-overlay { background: rgba(15,23,42,0.42); backdrop-filter: blur(10px); }
::-webkit-scrollbar-thumb { background: #cbd5e1; }
@media (max-width: 720px) {
  #app { padding: 18px 12px 44px; }
  .metric-grid { gap: 10px; }
  .card, .panel, .stage-card { padding: 1rem; }
}


/* Requested polish layer */
#app > * { animation: view-fade 220ms ease both; }
@keyframes view-fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

html.dark-mode input, html.dark-mode textarea {
  background-color: #101a2c;
  color: #eaf2ff;
  border-color: var(--border-subtle);
}
html.dark-mode input::placeholder, html.dark-mode textarea::placeholder { color: var(--text-tertiary); }
html.dark-mode .tiny.muted, html.dark-mode .small.muted, html.dark-mode .muted { color: var(--text-secondary); }

/* Kembali button: same color palette as "Proyek baru" primary button */
#btn-back {
  background: linear-gradient(135deg, #14b8a6, #0ea5e9) !important;
  border: 0 !important;
  color: #ffffff !important;
  font-weight: 600;
  box-shadow: 0 12px 26px rgba(14,165,233,0.22);
}
#btn-back:hover {
  background: linear-gradient(135deg, #0faaa0, #0284c7) !important;
  color: #ffffff !important;
}
#btn-back .icon-svg { color: #ffffff; }

/* Ninth revision layer: fix remaining light-mode leftovers in dark mode + smoother motion */
html.dark-mode .icon-btn {
  background: rgba(255,255,255,0.05);
  border-color: transparent;
}
html.dark-mode .icon-btn:hover {
  background-color: #16223a;
  border-color: var(--border-subtle);
}
html.dark-mode button.ghost.small,
html.dark-mode button.ghost.row {
  background-color: rgba(15,23,42,0.85);
  color: var(--text-secondary);
}

/* Smoother, less abrupt motion across interactive elements */
button {
  transition: background 0.18s ease, transform 0.15s cubic-bezier(.25,.8,.25,1),
    border-color 0.18s ease, box-shadow 0.18s ease, color 0.18s ease;
}
button:active { transform: scale(0.97); transition-duration: 0.08s; }
.icon-btn {
  transition: background 0.18s ease, color 0.18s ease, border-color 0.18s ease, transform 0.15s ease;
}
select, input, textarea {
  transition: background-color 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease, color 0.2s ease;
}
.more-menu-caret { transition: transform 0.22s cubic-bezier(.4,0,.2,1); }
.gauge-fill { transition: width 0.55s cubic-bezier(.4,0,.2,1); }
.proj-card, .stage-card, .card, .template-card, .mode-card, .wizard-card {
  transition: transform 0.22s cubic-bezier(.25,.8,.25,1), box-shadow 0.22s ease,
    border-color 0.22s ease, background 0.22s ease;
}
#app > * { animation: none; }
.task-row input[type="checkbox"],
.task-row input[type="checkbox"]:checked,
.task-row input[type="checkbox"]:not(:checked) {
  animation: none;
}
.task-name.done { animation: none; }
.task-row:has(input[type="checkbox"]:checked) { animation: none; }
@media (prefers-reduced-motion: reduce) {
  * { transition-duration: 0.001s !important; animation-duration: 0.001s !important; }
}

  function safeNormalize(p) {
    try { return normalizeProject(p); }

    function loadProjects() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        var parsed = JSON.parse(raw);
        if (Array.isArray(parsed)) return parsed.map(safeNormalize).filter(Boolean);
      }
      var old = localStorage.getItem(OLD_STORAGE_KEY);
      if (old) {
        var parsedOld = JSON.parse(old);
        if (Array.isArray(parsedOld)) {
          return parsedOld.map(function(p){
            try { return safeNormalize(migrateProject(p)); } catch(e) { return null; }
          }).filter(Boolean);
        }
      }
      return [];
    } catch (e) { console.error('SIPANTEK: gagal load proyek:', e); return []; }
  }
  function saveProjects(projects) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(projects)); return true; }
    catch (e) { return false; }
  }

  function uid(prefix) { return (prefix || 'id') + '_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8); }

  function cloneTemplate(key, isRoutine) {

  function taskProgress(task) {
    var items = (task && task.items) || [];
    if (items.length) {
      var done = items.filter(function(it){ return it && it.done; }).length;
      return (done / items.length) * 100;
    }
    return (task && task.done) ? 100 : 0;
  }
  function stageProgress(stage) {
    var tasks = (stage && stage.tasks) || [];
    if (!tasks.length) return 0;
    var sum = tasks.reduce(function(s, t){ return s + taskProgress(t); }, 0);
    return sum / tasks.length;
  }
  function totalWeightOf(project) {
    var stages = (project && project.stages) || [];
    return stages.reduce(function(sum, s){ return sum + Number((s && s.weight) || 0); }, 0);
  }
  function projectProgress(project) {
    if (!project) return 0;
    if (project.trackMode === 'simple') return project.simpleDone ? 100 : 0;
    var totalWeight = totalWeightOf(project);
    if (totalWeight === 0) return 0;
    var stages = project.stages || [];
    var weighted = stages.reduce(function(sum, s){
      return sum + (stageProgress(s) * Number((s && s.weight) || 0)) / totalWeight;
    }, 0);
    return Math.round(weighted * 10) / 10;
  }
  function isOverdue(targetDate, progress) {
    if (!targetDate) return false;
    if (progress >= 100) return false;
    var target = new Date(targetDate);
    if (isNaN(target.getTime())) return false;
    var today = new Date();
    today.setHours(0, 0, 0, 0);
    target.setHours(0, 0, 0, 0);
    return target.getTime() < today.getTime();
  }

  // ---------- Rekap tahunan ----------
  // Mengumpulkan seluruh tahun yang punya data (dari tanggal dibuat,
  // siklus berjalan, atau riwayat siklus yang sudah diarsipkan), supaya
  // dropdown pemilih tahun di halaman rekap selalu pas dengan data yang
  // benar-benar ada — termasuk tahun-tahun lampau.
  function availableRecapYears() {
    var years = {};
    years[new Date().getFullYear()] = true;
    state.projects.forEach(function(p){
      if (p.createdAt) years[new Date(p.createdAt).getFullYear()] = true;
      if (p.cycleStart) years[new Date(p.cycleStart).getFullYear()] = true;
      if (p.deadline) years[new Date(p.deadline).getFullYear()] = true;
      (p.history || []).forEach(function(h){
        if (h.completedAt) years[new Date(h.completedAt).getFullYear()] = true;
        if (h.cycleStart) years[new Date(h.cycleStart).getFullYear()] = true;
      });
    });
    return Object.keys(years).map(Number).sort(function(a, b){ return b - a; });
  }

  // Untuk satu proyek, cari status proyek tersebut PADA tahun tertentu:
  // - Kalau sudah ada siklus yang diarsipkan ke riwayat pada tahun itu ->
  //   pakai progress final siklus tersebut (data historis asli, tidak
  //   berubah lagi meskipun proyek terus dipakai di tahun-tahun berikutnya).
  //   Berlaku untuk proyek rutin maupun non-rutin, karena keduanya kini
  //   bisa memulai siklus baru.
  // - Kalau siklusnya sedang berjalan dan mencakup tahun itu (belum pernah
  //   diarsipkan) -> tampilkan progress saat ini sebagai estimasi "sejauh
  //   ini", ditandai belum final.
  function projectYearEntry(project, year) {
    var archived = (project.history || []).filter(function(h){
      return h.completedAt && new Date(h.completedAt).getFullYear() === year;
    });
    if (archived.length) {
      // Kalau lebih dari satu siklus diarsipkan di tahun yang sama
      // (misal proyek bulanan), rata-ratakan progress finalnya.
      var avg = archived.reduce(function(s, h){ return s + h.finalProgress; }, 0) / archived.length;
      return { progress: Math.round(avg * 10) / 10, final: true, cycles: archived.length };
    }
    var cycleYear = project.cycleStart ? new Date(project.cycleStart).getFullYear() : null;
    var deadlineYear = project.deadline ? new Date(project.deadline).getFullYear() : null;
    if (cycleYear !== null) {
      // Siklus dianggap "mencakup" tahun yang diminta kalau tahun itu berada
      // di antara cycleStart dan deadline (jika ada target selesai).
      // Kalau tidak ada deadline, siklus hanya dianggap milik tahun cycleStart-nya
      // saja, agar tidak ikut muncul di rekap tahun-tahun berikutnya tanpa batas.
      var coversYear = deadlineYear !== null
        ? (year >= cycleYear && year <= deadlineYear)
        : (year === cycleYear);
      if (coversYear) {
        // Siklus ini mencakup tahun yang diminta tapi belum pernah
        // diarsipkan (mis. siklus yang masih berjalan) -> tampilkan
        // progress berjalan sebagai estimasi, bukan angka final.
        return { progress: projectProgress(project), final: false, cycles: 0 };
      }
    }
    return null; // proyek ini tidak punya data sama sekali untuk tahun tsb.
  }

  function buildYearlyRecap(year) {
    var rows = [];
    state.projects.forEach(function(p){
      var entry = projectYearEntry(p, year);
      if (entry) rows.push({ project: p, progress: entry.progress, final: entry.final, cycles: entry.cycles });
    });
    var avgAll = rows.length ? rows.reduce(function(s, r){ return s + r.progress; }, 0) / rows.length : 0;
    var doneCount = rows.filter(function(r){ return r.progress >= 100; }).length;
    return {
      year: year,
      rows: rows,
      avgProgress: Math.round(avgAll * 10) / 10,
      doneCount: doneCount,
      totalCount: rows.length
    };
  }
  function normalizeProject(p) {
    p = p || {};
    if (!Array.isArray(p.stages)) p.stages = [];
    p.stages.forEach(function(s){
      if (!Array.isArray(s.tasks)) s.tasks = [];
      s.tasks.forEach(function(t){ if (!Array.isArray(t.items)) t.items = []; });
      if (typeof s.startDate !== 'string') s.startDate = '';
      if (typeof s.endDate !== 'string') s.endDate = '';
    });
    if (!Array.isArray(p.history)) p.history = [];
    if (!p.id) p.id = uid('proj');
    if (!p.category) p.category = 'Non-Rutin';
    if (!p.status) p.status = 'Belum mulai';
    if (!p.aspect || ASPECT_OPTIONS().indexOf(p.aspect) === -1) p.aspect = 'Umum';
    if (typeof p.name !== 'string') p.name = '';
    return p;
  }
  function statusColorVars(status) {

      case 'Berlangsung': return { bg: 'var(--bg-info)', text: 'var(--text-info)' };

  function gaugeColors(progress) {
    if (progress >= 100) return { c1: '#0D9488', c2: '#0B7C72', glow: 'rgba(13,148,136,0.28)' };
    if (progress < 30) return { c1: '#E0524F', c2: '#C9413E', glow: 'rgba(224,82,79,0.22)' };
    return { c1: '#2563EB', c2: '#1D4FC4', glow: 'rgba(37,99,235,0.22)' };
  }
  function renderGauge(progress, opts) {
    opts = opts || {};
    var size = opts.size || 'md';
    var ticks = opts.ticks === false ? false : true;
    var showReadout = opts.readout !== false;
    var v = Math.max(0, Math.min(100, progress));
    var col = gaugeColors(v);
    var cls = 'gauge' + (size === 'sm' ? ' gauge-sm' : '');
    var html = '<div style="display:flex; align-items:center; gap:10px; flex:1;">';
    html += '<div class="' + cls + '" style="flex:1; --g-color:' + col.c1 + '; --g-color-2:' + col.c2 + '; --g-glow:' + col.glow + ';">';
    if (ticks && size !== 'sm') {
      html += '<div class="gauge-ticks">';
      for (var i = 0; i < 10; i++) html += '<span></span>';
      html += '</div>';
    }
    html += '<div class="gauge-fill" style="width:' + v + '%;"></div>';
    html += '</div>';
    if (showReadout) {
      html += '<span class="gauge-readout small" style="min-width:44px; text-align:right; color:' + col.c1 + ';">' + v + '%</span>';
    }
    html += '</div>';
    return html;
  }
  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function(c){

  function fmtDate(iso) {

  // ---------- Sync dengan GitHub Gist ----------
  var GIST_ID_KEY   = 'sipantek:gist-id';
  var GIST_PAT_KEY  = 'sipantek:gist-pat';
  var GIST_FILENAME = 'sipantek-data.json';
  var POLL_INTERVAL_MS  = 5000;
  var pollTimer         = null;
  var pushDebounceTimer = null;
  var isPushing         = false;
  var lastPushAt        = 0;
  var lastPullAt        = 0;
  var pendingLocalIds   = {};
  // Flag: ada perubahan lokal yang belum di-push ke Gist.
  // Selama flag ini true, pull TIDAK boleh overwrite state.projects
  // agar ketikan user tidak ter-reset di tengah jalan.
  var hasLocalChanges   = false;

  function getGistId()  { try { return localStorage.getItem(GIST_ID_KEY)  || ''; } catch(e){ return ''; } }
  function getGistPat() { try { return localStorage.getItem(GIST_PAT_KEY) || ''; } catch(e){ return ''; } }
  function setGistCreds(id, pat) {
    try { localStorage.setItem(GIST_ID_KEY, id); localStorage.setItem(GIST_PAT_KEY, pat); } catch(e){}
  }
  function clearGistCreds() {
    try { localStorage.removeItem(GIST_ID_KEY); localStorage.removeItem(GIST_PAT_KEY); } catch(e){}
  }
  function isConnected() { return !!(getGistId() && getGistPat()); }

  // Render aman dari async callback — tunda jika user sedang mengetik
  function safeRender() {
    if (isEditingTextField()) { pendingRender = true; }
    else { render(); }
  }

  function pullFromGist(opts) {
    opts = opts || {};
    if (!isConnected()) return;
    // Jangan pull kalau push sedang berjalan atau ada perubahan lokal
    // yang belum selesai di-push — agar ketikan user tidak ter-reset
    if (isPushing || hasLocalChanges) return;
    fetch('https://api.github.com/gists/' + getGistId(), {
      headers: {
        'Authorization': 'Bearer ' + getGistPat(),
        'Accept': 'application/vnd.github+json',
        'X-GitHub-Api-Version': '2022-11-28'
      }
    })
      .then(function(res){
        if (!res.ok) throw new Error('GitHub API ' + res.status);
        return res.json();
      })
      .then(function(data){
        // Batalkan apply kalau kondisi berubah saat fetch berlangsung
        if (isPushing || hasLocalChanges) return;
        var file = data.files && data.files[GIST_FILENAME];
        if (!file) throw new Error('File tidak ditemukan di Gist');
        var parsed = JSON.parse(file.content || '{"projects":[]}');
        var fromGist = (parsed.projects || []).map(safeNormalize).filter(Boolean);
        var gistIds = {};
        fromGist.forEach(function(p){ gistIds[p.id] = true; });
        Object.keys(pendingLocalIds).forEach(function(pid){
          if (gistIds[pid]) delete pendingLocalIds[pid];
        });
        state.projects.forEach(function(p){
          if ((pendingLocalIds[p.id] || p.id === state.activeId) && !gistIds[p.id]) {
            fromGist.push(p);
          }
        });
        state.projects = fromGist;
        saveProjects(state.projects);
        lastPullAt = Date.now();
        state.syncStatus = 'synced';
        state.lastSyncAt = new Date().toISOString();
        state.syncErrorMsg = '';
        safeRender();
      })
      .catch(function(err){
        state.syncStatus = 'error';
        state.syncErrorMsg = String(err.message || err);
        safeRender();
      });
  }

  function pushToGist() {
    if (!isConnected()) return;
    isPushing = true;
    state.syncStatus = 'syncing';
    var payload = JSON.stringify({ projects: state.projects, updatedAt: new Date().toISOString() }, null, 2);
    fetch('https://api.github.com/gists/' + getGistId(), {
      method: 'PATCH',
      headers: {
        'Authorization': 'Bearer ' + getGistPat(),
        'Accept': 'application/vnd.github+json',
        'X-GitHub-Api-Version': '2022-11-28',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ files: { 'sipantek-data.json': { content: payload } } })
    })
      .then(function(res){
        if (!res.ok) throw new Error('GitHub API ' + res.status);
        return res.json();
      })
      .then(function(){
        isPushing = false;
        hasLocalChanges = false; // push berhasil → tidak ada lagi perubahan lokal pending
        lastPushAt = Date.now();
        state.syncStatus = 'synced';
        state.lastSyncAt = new Date().toISOString();
        state.syncErrorMsg = '';
        safeRender();
        setTimeout(function(){ pullFromGist({ silent: true }); }, 1000);
      })
      .catch(function(err){
        isPushing = false;
        // Jangan reset hasLocalChanges saat error — perubahan lokal masih ada
        state.syncStatus = 'error';
        state.syncErrorMsg = String(err.message || err);
        safeRender();
      });
  }

  function schedulePush() {
    if (!isConnected()) return;
    hasLocalChanges = true; // ada perubahan lokal, blokir pull sampai push selesai
    clearTimeout(pushDebounceTimer);
    pushDebounceTimer = setTimeout(pushToGist, 800);
  }

  function startPolling() {
    clearInterval(pollTimer);
    if (!isConnected()) return;
    pollTimer = setInterval(function(){ pullFromGist({ silent: true }); }, POLL_INTERVAL_MS);
  }

  function disconnectSync() {
    clearInterval(pollTimer);
    clearTimeout(pushDebounceTimer);
    clearGistCreds();
    hasLocalChanges = false;
    state.syncStatus = 'offline';
    state.lastSyncAt = null;
    state.syncErrorMsg = '';
  }

  var state = {

  function persist() {

  // Sama seperti persist(), tapi TIDAK memanggil render(). Dipakai saat user
  // sedang mengetik di sebuah input teks (oninput), supaya elemen tidak

  function persistSilent() {

  function findProject(id) { return state.projects.filter(function(p){ return p.id === id; })[0] || null; }

  var app = document.getElementById('app');

  // Sekumpulan id/atribut input teks yang aman untuk "diketik" tanpa
  // diinterupsi oleh render() yang datang dari proses lain (sync ke Gist,
  // polling otomatis, dsb). Kalau elemen yang sedang fokus ada di sini,
  // render() ditunda sampai user pindah fokus (blur) dari input tersebut.
  function isEditingTextField() {
    var el = document.activeElement;
    if (!el || !app.contains(el)) return false;
    var tag = el.tagName;
    if (tag !== 'INPUT' && tag !== 'TEXTAREA') return false;
    if (el.type === 'checkbox' || el.type === 'radio') return false;
    return true;
  }

  function render() {
    window.sipantekRender = render;
    // Kalau ada render lain yang sedang ditunda (mis. dipicu sync di
    // belakang layar) sementara user mengetik, jangan timpa DOM sekarang —
    // tunggu sampai user selesai (blur), lalu render sekali saja saat itu.
    if (isEditingTextField()) { pendingRender = true; return; }
    pendingRender = false;
    try {
      var html = '<h2 class="sr-only">SIPANTEK — Sistem Pelaporan Environmental Terkini, terbagi rutin dan non-rutin, dengan progress berbasis tahapan atau status selesai per siklus</h2>';
      if (state.saveError) {
        html += '<div class="card" style="background:var(--bg-danger); color:var(--text-danger); border:none; margin-bottom:12px; padding:8px 12px; font-size:13px;">Gagal menyimpan perubahan ke penyimpanan browser ini.</div>';
      }
      if (state.view === 'list') html += renderListView();
      else if (state.view === 'new') html += renderNewView();
      else if (state.view === 'detail') {
        var _p = findProject(state.activeId);
        if (!_p) {
          console.error('SIPANTEK: activeId=' + state.activeId + ' tidak ditemukan di state.projects (jumlah=' + state.projects.length + ')');
          state.view = 'list'; html += renderListView();
        } else {
          html += renderDetailView(_p);
        }
      }
      else if (state.view === 'recap') html += renderRecapView();
      if (state.showSetupModal) html += renderSetupModal();
      app.innerHTML = html;
      bindEvents();
    } catch (err) {
      // Jangan biarkan layar jadi kosong total kalau terjadi error tak
      // terduga saat membangun tampilan — kembalikan ke daftar proyek
      // (tampilan paling aman) supaya data yang sudah tersimpan tidak
      // terasa "hilang" di mata pengguna.
      console.error('SIPANTEK render error (view=' + state.view + ', activeId=' + state.activeId + '):', err);
      if (state.view !== 'list') {
        var savedActiveId = state.activeId;
        state.view = 'list';
        state.activeId = null;
        try {
          app.innerHTML = renderListView();
          bindEvents();

          errBanner.textContent = 'Terjadi kesalahan tampilan (lihat Console untuk detail). Data proyek aman tersimpan.';
          app.insertBefore(errBanner, app.firstChild);
        } catch (err2) { console.error('SIPANTEK fallback render error:', err2); }
      }
    }
  }

  document.addEventListener('focusout', function(e){
    var tag = e.target && e.target.tagName;
    if (tag !== 'INPUT' && tag !== 'TEXTAREA') return;
    if (pendingRender) render();
  }, true);

  // ---------- Power-user keyboard navigation ----------
  // Aktif hanya kalau fokus TIDAK sedang di dalam form field (supaya tidak
  // mengganggu pengetikan) dan tidak ada modal terbuka.
  document.addEventListener('keydown', function(e){
    var activeTag = document.activeElement && document.activeElement.tagName;
    var inFormField = activeTag === 'INPUT' || activeTag === 'TEXTAREA' || activeTag === 'SELECT';
    if (state.showSetupModal) return;

    if (state.view === 'list' && !inFormField) {
      var rows = Array.prototype.slice.call(document.querySelectorAll('.proj-card'));
      if (e.key === 'ArrowDown' || e.key === 'j') {
        if (rows.length) {
          e.preventDefault();
          var i = rows.indexOf(document.activeElement);
          rows[i < 0 ? 0 : Math.min(i + 1, rows.length - 1)].focus();
        }
        return;
      }
      if (e.key === 'ArrowUp' || e.key === 'k') {
        if (rows.length) {
          e.preventDefault();
          var i2 = rows.indexOf(document.activeElement);
          rows[i2 <= 0 ? 0 : i2 - 1].focus();
        }
        return;
      }
      if (e.key === 'Home' && rows.length) { e.preventDefault(); rows[0].focus(); return; }
      if (e.key === 'End' && rows.length) { e.preventDefault(); rows[rows.length - 1].focus(); return; }
      if ((e.key === 'n' || e.key === 'N') && !e.metaKey && !e.ctrlKey) {
        e.preventDefault();
        var btnNewEl = document.getElementById('btn-new');
        if (btnNewEl) btnNewEl.click();
        return;
      }
    }

    if (e.key === 'Escape' && (state.view === 'detail' || state.view === 'new' || state.view === 'recap') && !inFormField) {
      state.view = 'list'; render();
    }
  });

    function renderListView() {
    var isRoutine = state.activeTab === 'rutin';
    var pool = state.projects.filter(function(p){ return (p.category === 'Rutin') === isRoutine; });
    var filtered = pool.filter(function(p){
      var freqOk = state.filterFrequency === 'Semua' || p.frequency === state.filterFrequency;
      var statOk = state.filterStatus === 'Semua' || p.status === state.filterStatus;
      var aspectOk = state.filterAspect === 'Semua' || p.aspect === state.filterAspect;
      return freqOk && statOk && aspectOk;
    });

    var avg = pool.length ? Math.round((pool.reduce(function(s,p){ return s + projectProgress(p); }, 0) / pool.length) * 10) / 10 : 0;
    var ongoing = pool.filter(function(p){ return p.status === t('inProgress'); }).length;
    var done = pool.filter(function(p){ return p.status === t('completed'); }).length;
    var delayed = pool.filter(function(p){ return p.status === t('onHold'); }).length;

    html += '<button class="primary" id="btn-new">' + icon('plus', { marginRight: 4 }) + 'Proyek baru</button>';
    html += '</div></div>';

    html += '<div class="tabs">';

    }
    html += '<select id="filter-status"><option value="Semua">' + t('allStatuses') + '</option>' + STATUS_OPTIONS().map(function(s){ return '<option value="'+esc(s)+'" '+(state.filterStatus===s?'selected':'')+'>'+esc(s)+'</option>'; }).join('') + '</select>';

      var emptyIcon = pool.length === 0 ? 'folder-plus' : 'search-x';

        : 'Tidak ada hasil';
      var emptySub = pool.length === 0
        ? (isRoutine
          ? 'Buat proyek seperti audit CEMS tahunan untuk mulai melacak.'
          : 'Cocok untuk hal mendadak seperti kunjungan pemerintah.')

  function renderProjRow(p, isRoutine) {
    var progress = projectProgress(p);
    var sc = statusColorVars(p.status);
    var wTotal = totalWeightOf(p);
    var html = '';
    html += '<div class="proj-card" data-open="' + p.id + '" tabindex="0" role="button" aria-label="Buka proyek ' + esc(p.name || 'tanpa nama') + '" style="--row-accent:' + sc.text + ';">';
    html += '<div class="between" style="align-items:flex-start; gap:12px; margin-bottom:10px;">';
    html += '<div style="min-width:0;">';
    html += '<div class="row" style="gap:8px;">';
    html += '<p style="margin:0; font-weight:500; font-size:15px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">' + esc(p.name || '(tanpa nama)') + '</p>';
    if (isRoutine) html += '<span class="freq-pill">' + esc(freqLabel(p.frequency)) + '</span>';
    html += '<span class="freq-pill">' + esc(p.aspect || 'Umum') + '</span>';
    if (isOverdue(p.deadline, progress)) html += '<span class="inline-warning" title="Terlambat">' + icon('alert-triangle', { size: 13, marginRight: 4 }) + 'Terlambat</span>';
    html += '</div>';
    html += '<div class="row tiny muted" style="margin-top:4px; flex-wrap:wrap; gap:8px;">';
    if (p.pic) html += '<span>PIC: ' + esc(p.pic) + '</span>';
    if (p.cycleStart) html += '<span>&middot; Mulai: ' + fmtDate(p.cycleStart) + '</span>';
    if (p.deadline) html += '<span>&middot; Target: ' + fmtDate(p.deadline) + '</span>';
    if (p.history && p.history.length) html += '<span>&middot; ' + p.history.length + ' siklus selesai</span>';
    html += '</div></div>';
    html += '<span class="badge" style="background:' + sc.bg + '; color:' + sc.text + ';">' + esc(p.status) + '</span>';
    html += '</div>';
    var pcol = gaugeColors(progress);
    html += '<div class="proj-bottom-progress">' + renderGauge(progress, { size: 'sm', readout: false }) + '<span class="proj-progress-label" style="color:' + pcol.c1 + ';">' + progress + '%</span></div>';
    if (p.trackMode === 'tahapan' && wTotal !== 100) {
      html += '<p class="alert">' + icon('alert-triangle', { size: 13, valign: '-2px', marginRight: 4 }) + 'Total bobot tahapan ' + wTotal + '%, seharusnya 100%</p>';
    }
    html += '</div>';
    return html;
  }

  function metricCard(label, value, accent) {
    return '<div class="metric-card"><p class="lbl">' + esc(label) + '</p><p class="val' + (accent ? ' accent' : '') + '">' + esc(value) + '</p></div>';
  }

  // ---------- Recap view ----------
  function renderRecapView() {
    var years = availableRecapYears();
    if (years.indexOf(state.recapYear) === -1) state.recapYear = years[0];
    var recap = buildYearlyRecap(state.recapYear);
    var html = '';
    html += '<button class="ghost" id="btn-back" style="margin-bottom:1rem;">' + icon('arrow-left', { marginRight: 4 }) + 'Kembali</button>';

    html += '<div class="between" style="margin-bottom:1.25rem; flex-wrap:wrap; gap:10px;">';
    html += '<h1 style=\"font-size:20px;\">' + t('yearlyRecap') + '</h1>';
    html += '<select id="recap-year" style="font-weight:600;">' + years.map(function(y){ return '<option value="'+y+'" '+(y===state.recapYear?'selected':'')+'>'+y+'</option>'; }).join('') + '</select>';
    html += '</div>';

    html += '<div class="metric-grid" style="margin-bottom:1.25rem;">';
    html += metricCard(t('avgProgress') + ' ' + state.recapYear, recap.avgProgress + '%', true);
    html += metricCard('Proyek tuntas 100%', recap.doneCount + ' dari ' + recap.totalCount);
    html += metricCard(t('recordedProjects'), recap.totalCount);
    html += '</div>';

    if (!recap.rows.length) {
      html += '<div class="card" style="text-align:center; padding:2rem 1rem;">';
      html += '<p class="small muted" style="margin:0;">Belum ada proyek yang tercatat untuk tahun ' + state.recapYear + '. Data akan muncul di sini begitu ada proyek yang dibuat atau siklus yang diarsipkan pada tahun tersebut.</p>';
      html += '</div>';
      return html;
    }

    var routineRows = recap.rows.filter(function(r){ return r.project.category === t('routine'); });
    var nonRoutineRows = recap.rows.filter(function(r){ return r.project.category !== t('routine'); });

    function recapTable(rows) {
      var t = '<div class="card" style="padding:0; overflow:hidden;">';
      rows.forEach(function(r, idx){
        var p = r.project;
        t += '<div class="recap-row' + (idx < rows.length - 1 ? ' bordered' : '') + '">';
        t += '<div style="flex:1; min-width:0;">';
        t += '<p style="margin:0; font-weight:500; font-size:14.5px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">' + esc(p.name || '(tanpa nama)') + '</p>';
        t += '<p class="small muted" style="margin:2px 0 0;">' + esc(p.aspect || 'Umum') + (p.category === 'Rutin' ? ' &middot; ' + esc(freqLabel(p.frequency)) : '') + (r.cycles > 1 ? ' &middot; ' + r.cycles + ' siklus diarsipkan' : '') + '</p>';
        t += '</div>';
        t += '<div style="text-align:right; flex-shrink:0;">';
        t += '<p style="margin:0; font-weight:600; font-size:15px;">' + r.progress + '%</p>';
        t += '<p class="small muted" style="margin:2px 0 0;">' + (r.final ? 'Final' : t('inProgress') + ', belum diarsipkan') + '</p>';
        t += '</div>';
        t += '</div>';
      });
      t += '</div>';
      return t;
    }

    if (routineRows.length) {
      html += '<h3 style="font-size:14px; color:var(--text-secondary); margin:0 0 8px;">' + t('routineProjects2') + ' (' + routineRows.length + ')</h3>';
      html += recapTable(routineRows);
    }
    if (nonRoutineRows.length) {
      html += '<h3 style="font-size:14px; color:var(--text-secondary); margin:' + (routineRows.length ? '20px' : '0') + ' 0 8px;">' + t('nonRoutineProjects2') + ' (' + nonRoutineRows.length + ')</h3>';
      html += recapTable(nonRoutineRows);
    }

    html += '<p class="small muted" style="margin-top:16px;">Progress proyek yang ditandai &ldquo;Berjalan, belum diarsipkan&rdquo; adalah angka saat ini (live) untuk siklus yang mencakup tahun ' + state.recapYear + ', dan masih bisa berubah sampai kamu menekan &ldquo;Mulai siklus baru&rdquo; pada proyek tersebut.</p>';

    return html;
  }

    var f = state.newForm;
    var html = '';

    html += '<div class="new-project-form">';

    html += '<section class="wizard-card"><h2>Jenis & Template</h2><div><label class="small muted" style="display:block; margin-bottom:6px;">Jenis proyek</label>';
    html += '<div class="mode-toggle">';
    html += '<div class="mode-card ' + (isRoutine ? 'active' : '') + '" data-routine="1"><strong>Rutin</strong><div class="tiny muted" style="margin-top:2px;">berulang dengan frekuensi tetap</div></div>';
    html += '<div class="mode-card ' + (!isRoutine ? 'active' : '') + '" data-routine="0"><strong>Non-rutin</strong><div class="tiny muted" style="margin-top:2px;">sekali jalan, tidak terjadwal</div></div>';

    html += '<div><label class="small muted" style="display:block; margin-bottom:6px;">Mulai dari template</label>';

      html += '<div class="template-card ' + (key==='simple_routine'?'active':'') + '" data-template="simple_routine">' + icon('checkbox', { size: 20, valign: '-4px' }) + '<p class="t-title">Paket Hemat</p><p class="t-sub">hanya tandai selesai per pekerjaan</p></div>';
      html += '<div class="template-card ' + (key==='blank'?'active':'') + '" data-template="blank">' + icon('file-plus', { size: 20, valign: '-4px' }) + '<p class="t-title">Paket Suka-suka</p><p class="t-sub">susun tahapan dan ceklis sesukamu</p></div>';
    } else {
      html += '<div class="template-card ' + (key==='nonroutine'?'active':'') + '" data-template="nonroutine">' + icon('bolt', { size: 20, valign: '-4px' }) + '<p class="t-title">Mulai kosong</p><p class="t-sub">misal kunjungan pemerintah</p></div>';
    }
    html += '</div></div></section>';

    html += '<section class="wizard-card"><h2>Informasi Utama</h2><div><label class="small muted" style="display:block; margin-bottom:6px;">' + t('aspect') + '</label>';
    html += '<select id="new-aspect">' + ASPECT_OPTIONS().map(function(a){ return '<option value="'+esc(a)+'" '+(f.aspect===a?'selected':'')+'>'+esc(a)+'</option>'; }).join('') + '</select></div>';

    html += '<div><label class="small muted" style="display:block; margin-bottom:6px;">Nama proyek</label>';
    html += '<input id="new-name" value="' + esc(f.name) + '" placeholder="' + (isRoutine ? 'misal: Audit CEMS PLTU Unit 1' : 'misal: Kunjungan Dinas LH ke lokasi pabrik') + '"></div>';

    if (isRoutine) {
      html += '<div><label class="small muted" style="display:block; margin-bottom:6px;">' + t('frequency') + '</label>';
      html += '<select id="new-frequency">' + FREQUENCIES().map(function(fr){ return '<option value="'+fr.key+'" '+(f.frequency===fr.key?'selected':'')+'>'+esc(fr.label)+'</option>'; }).join('') + '</select></div>';

      if (key !== 'simple_routine') {
        html += '<p class="small muted" style="margin:0;">Progress proyek ini dihitung otomatis dari tahapan, task, dan item yang kamu susun di bawah &mdash; tinggal lanjut isi detail proyek.</p>';
      }
    }
    html += '</section>';

    html += '<section class="wizard-card"><h2>Jadwal & PIC</h2><div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">';
    html += '<div><label class="small muted" style="display:block; margin-bottom:6px;">Tanggal mulai</label><input type="date" id="new-start-date" value="' + esc(f.startDate) + '"></div>';
    html += '<div><label class="small muted" style="display:block; margin-bottom:6px;">Target selesai</label><input type="date" id="new-deadline" value="' + esc(f.deadline) + '"></div>';
    html += '</div>';

    html += '<div><label class="small muted" style="display:block; margin-bottom:6px;">PIC</label><input id="new-pic" value="' + esc(f.pic) + '" placeholder="nama penanggung jawab"></div>';

    html += '<div><label class="small muted" style="display:block; margin-bottom:6px;">Status proyek</label>';
    html += '<select id="new-status">' + STATUS_OPTIONS().map(function(s){ return '<option value="'+esc(s)+'" '+(f.status===s?'selected':'')+'>'+esc(s)+'</option>'; }).join('') + '</select></div></section>';

    if (isRoutine && key === 'simple_routine') {
      html += '<div class="card" style="background:var(--bg-well); border:none; padding:0.75rem 1rem; font-size:13px; color:var(--text-secondary);">Cocok untuk cek harian/bulanan yang tidak perlu tahapan detail &mdash; cukup tandai selesai, lalu mulai siklus berikutnya.</div>';
    }

    html += '<button class="primary" id="btn-create" style="align-self:flex-start; margin-top:4px;">' + icon('plus', { marginRight: 4 }) + 'Buat proyek</button>';
    html += '</div>';
    return html;
  }

  // ---------- Detail view ----------
  function renderDetailView(project) {
    if (!project) return '<p class="muted">Proyek tidak ditemukan.</p>';
    var progress = projectProgress(project);
    var wTotal = totalWeightOf(project);
    var isRoutine = project.category === t('routine');
    var html = '';

    html += '<div class="between" style="margin-bottom:1rem;">';
    html += '<div class="row" style="gap:10px;">';
    html += '<button class="ghost" id="btn-back">' + icon('arrow-left', { marginRight: 4 }) + 'Kembali</button>';
    if (isOverdue(project.deadline, progress)) html += '<span class="badge" style="background:var(--bg-danger); color:var(--text-danger);">' + icon('alert-triangle', { size: 11, marginRight: 3 }) + 'Terlambat dari target</span>';
    html += '</div>';
    if (state.confirmDeleteId === project.id) {
      html += '<div class="row small">';
      html += '<span class="muted">Yakin hapus?</span>';
      html += '<button class="ghost" id="btn-confirm-delete" style="color:var(--text-danger);">Ya, hapus</button>';
      html += '<button class="ghost" id="btn-cancel-delete">' + t('cancel') + '</button>';
      html += '</div>';
    } else {
      html += '<button class="ghost small" id="btn-ask-delete" style="color:var(--text-danger);">' + icon('trash', { size: 14, valign: '-2px', marginRight: 4 }) + 'Hapus proyek</button>';
    }
    html += '</div>';

    html += '<div style="margin-bottom:1.25rem;">';
    html += '<input class="name-input-large" id="proj-name" value="' + esc(project.name) + '" placeholder=t("projectName")>';
    html += '<div class="meta-row">';
    html += '<span class="freq-pill meta-row-pill" style="align-self:flex-end;">' + esc(project.category) + (isRoutine ? ' &middot; ' + esc(freqLabel(project.frequency)) : '') + '</span>';
    html += '<div class="meta-field"><span class="tiny muted">' + t('aspect') + '</span><select id="proj-aspect">' + ASPECT_OPTIONS().map(function(a){ return '<option value="'+esc(a)+'" '+(project.aspect===a?'selected':'')+'>'+esc(a)+'</option>'; }).join('') + '</select></div>';
    html += '<div class="meta-field"><span class="tiny muted">' + t('status') + '</span><select id="proj-status">' + STATUS_OPTIONS().map(function(s){ return '<option value="'+esc(s)+'" '+(project.status===s?'selected':'')+'>'+esc(s)+'</option>'; }).join('') + '</select></div>';
    html += '<div class="meta-field"><span class="tiny muted">PIC</span><input id="proj-pic" value="' + esc(project.pic) + '" placeholder="PIC"></div>';
    html += '<div class="meta-field"><span class="tiny muted">Mulai</span><input type="date" id="proj-start-date" value="' + esc((project.cycleStart || '').slice(0,10)) + '"></div>';
    html += '<div class="meta-field"><span class="tiny muted">Target selesai</span><input type="date" id="proj-deadline" value="' + esc(project.deadline) + '"></div>';
    html += '</div></div>';

    html += '<div class="cycle-banner">';
    html += '<span>' + icon('refresh', { valign: '-2px', marginRight: 6 }) + 'Siklus berjalan sejak ' + fmtDate(project.cycleStart) + (project.history && project.history.length ? ' &middot; ' + project.history.length + ' siklus sebelumnya tersimpan di riwayat' : '') + '</span>';
    if (!state.confirmNewCycle) {
      html += '<button class="ghost small" id="btn-ask-new-cycle" style="white-space:nowrap;">Mulai siklus baru</button>';
    } else {
      html += '<div class="row small" style="white-space:nowrap;"><span class="muted">Reset progress &amp; simpan ke riwayat?</span><button class="ghost" id="btn-confirm-new-cycle" style="color:var(--text-success); font-weight:500;">Ya, mulai baru</button><button class="ghost" id="btn-cancel-new-cycle">' + t('cancel') + '</button></div>';
    }
    html += '</div>';

    if (project.trackMode === 'simple') {
      html += '<div class="simple-done-card" style="margin-bottom:1.5rem;">';
      html += '<div><p style="margin:0; font-weight:500; font-size:15px;">' + (project.simpleDone ? 'Sudah selesai siklus ini' : 'Belum selesai siklus ini') + '</p><p class="small muted" style="margin:4px 0 0;">Tandai saat pekerjaan periode ini sudah tuntas. Setelah itu, klik &ldquo;Mulai siklus baru&rdquo; di atas untuk menyimpan siklus ini ke riwayat dan memulai periode berikutnya.</p></div>';
      html += '<button class="' + (project.simpleDone ? 'ghost' : 'success-btn') + '" id="btn-toggle-simple">' + (project.simpleDone ? 'Batalkan tanda selesai' : 'Tandai selesai') + '</button>';
      html += '</div>';
    } else {
      var gcol = gaugeColors(progress);
      html += '<div class="card" style="background:var(--bg-well); border-color:var(--border-strong); margin-bottom:1.5rem; position:relative; overflow:hidden;">';
      html += '<div class="between" style="align-items:flex-end; margin-bottom:10px;">';
      html += '<span class="eyebrow" style="margin:0;"><span class="dot" style="background:' + gcol.c1 + '; box-shadow:0 0 6px ' + gcol.c1 + ';"></span>Progress siklus ini</span>';
      html += '<span class="gauge-readout" style="font-size:34px; color:' + gcol.c1 + ';">' + progress + '<span style="font-size:16px; opacity:0.6;">%</span></span>';
      html += '</div>';
      html += renderGauge(progress, { readout: false });
      if (wTotal !== 100) {
        html += '<p class="alert" style="margin-top:10px;">' + icon('alert-triangle', { size: 13, valign: '-2px', marginRight: 4 }) + 'Total bobot tahapan saat ini ' + wTotal + '%. Sesuaikan bobot tiap tahap agar totalnya 100% supaya angka progress akurat.</p>';
      }
      html += '</div>';

      html += '<div class="between" style="margin-bottom:10px;"><h3 style="font-size:16px;">Tahapan</h3>';
      html += '<button class="ghost small" id="btn-add-stage">' + icon('plus', { size: 14, valign: '-2px', marginRight: 4 }) + 'Tambah tahap</button></div>';

      html += '<div style="display:flex; flex-direction:column; gap:10px;">';
      project.stages.forEach(function(stage){ html += renderStageCard(stage); });
      html += '</div>';
    }

    html += '<div style="margin-top:1.5rem;">';
    html += '<button class="ghost row small" id="btn-toggle-history">' + icon(state.showHistory ? 'chevron-down' : 'chevron-right') + 'Riwayat siklus (' + (project.history ? project.history.length : 0) + ')</button>';
    if (state.showHistory) {
      html += '<div class="card" style="margin-top:8px;">';
      if (!project.history || !project.history.length) {
        html += '<p class="small muted" style="margin:0;">Belum ada siklus yang diarsipkan. Riwayat akan terisi setelah kamu menandai pekerjaan periode ini selesai, lalu menekan &ldquo;Mulai siklus baru&rdquo; di atas.</p>';
      } else {
        project.history.slice().reverse().forEach(function(h){
          html += '<div class="history-row"><span>' + fmtDate(h.cycleStart) + ' &ndash; ' + fmtDate(h.completedAt) + '</span><span style="font-weight:500;">' + h.finalProgress + '%</span></div>';
        });
      }

    html += '</div>';

  function renderStageCard(stage) {
    var progress = Math.round(stageProgress(stage));
    var doneCount = stage.tasks.filter(function(t){ return taskProgress(t) >= 100; }).length;
    var expanded = state.expandedStages[stage.id] !== false;
    var html = '<div class="stage-card" data-stage="' + stage.id + '">';
    html += '<div class="row" style="gap:10px;">';
    html += '<button class="icon-btn" data-toggle-stage="' + stage.id + '" aria-label="' + (expanded ? 'Tutup tahap' : 'Buka tahap') + '">' + icon(expanded ? 'chevron-down' : 'chevron-right') + '</button>';
    html += '<input class="stage-name-input" data-stage-name="' + stage.id + '" value="' + esc(stage.name) + '" style="flex:1; min-width:0;">';
    html += '<div class="stage-inline-progress">' + renderGauge(progress, { size: 'sm', readout: false }) + '<span class="tiny muted mono">' + progress + '%</span></div>';
    if (isOverdue(stage.endDate, progress)) html += '<span class="inline-warning" title="Terlambat">' + icon('alert-triangle', { size: 13, marginRight: 4 }) + 'Terlambat</span>';
    html += '<div class="row" style="gap:4px;"><input type="number" min="0" max="100" class="weight-input" data-stage-weight="' + stage.id + '" value="' + stage.weight + '"><span class="small muted">%</span></div>';
    html += '<button class="icon-btn" data-delete-stage="' + stage.id + '" aria-label="Hapus tahap">' + icon('x') + '</button>';
    html += '</div>';

    html += '<div class="row" style="gap:20px; margin-top:8px; margin-left:34px; flex-wrap:wrap;">';
    html += '<span class="tiny muted mono">' + doneCount + '/' + stage.tasks.length + ' task selesai</span>';
    html += '<div class="row" style="gap:6px; align-items:center; flex-wrap:wrap;">';
    html += '<span class="tiny muted">Mulai</span><input type="date" class="stage-date-input" data-stage-start="' + stage.id + '" value="' + esc(stage.startDate || '') + '">';
    html += '<span class="tiny muted" style="margin-left:8px;">' + t('completed') + '</span><input type="date" class="stage-date-input" data-stage-end="' + stage.id + '" value="' + esc(stage.endDate || '') + '">';
    html += '</div>';
    html += '</div>';

    if (expanded) {
      html += '<div style="margin-top:10px; margin-left:34px; display:flex; flex-direction:column; gap:6px;">';
      stage.tasks.forEach(function(task){ html += renderTaskRow(stage, task); });
      html += '<div class="row" style="gap:6px; margin-top:4px;">';
      html += '<input data-new-task="' + stage.id + '" placeholder="tambah task..." style="flex:1; height:30px; padding:6px 10px; font-size:13px;">';
      html += '<button data-add-task="' + stage.id + '" style="height:30px; padding:0 12px; font-size:13px;">Tambah</button>';
      html += '</div></div>';
    }
    html += '</div>';
    return html;
  }

  function renderTaskRow(stage, task) {
    var items = task.items || [];
    var hasItems = items.length > 0;
    var taskKey = stage.id + '|' + task.id;
    var itemsExpanded = !!state.expandedTasks[taskKey];
    var itemDoneCount = items.filter(function(it){ return it.done; }).length;
    var html = '<div class="task-block">';
    html += '<div class="task-row">';
    if (hasItems) {
      html += '<button class="icon-btn" data-toggle-task-items="' + taskKey + '" aria-label="' + (itemsExpanded ? 'Tutup item' : 'Buka item') + '" style="width:20px; height:20px; flex-shrink:0;">' + icon(itemsExpanded ? 'chevron-down' : 'chevron-right', { size: 12 }) + '</button>';
    } else {
      html += '<input type="checkbox" data-toggle-task="' + taskKey + '" ' + (task.done ? 'checked' : '') + '>';
    }
    html += '<input class="task-name ' + (taskProgress(task) >= 100 ? 'done' : '') + '" data-task-name="' + taskKey + '" value="' + esc(task.name) + '" style="border:none; background:transparent; padding:2px 0;">';
    if (hasItems) {
      html += '<span class="tiny muted mono" style="flex-shrink:0;">' + itemDoneCount + '/' + items.length + '</span>';
    } else {
      html += '<button class="icon-btn" data-toggle-task-items="' + taskKey + '" aria-label="Tambah item" title="Tambah item ke task ini" style="width:20px; height:20px;">' + icon('plus', { size: 12 }) + '</button>';
    }
    html += '<button class="icon-btn" data-delete-task="' + taskKey + '" aria-label="Hapus task" style="width:20px; height:20px;">' + icon('x', { size: 12 }) + '</button>';
    html += '</div>';

    if (itemsExpanded) {
      html += '<div style="margin-left:28px; margin-top:4px; display:flex; flex-direction:column; gap:4px;">';
      items.forEach(function(item){
        var itemKey = stage.id + '|' + task.id + '|' + item.id;
        html += '<div class="task-row">';
        html += '<input type="checkbox" data-toggle-item="' + itemKey + '" ' + (item.done ? 'checked' : '') + '>';
        html += '<input class="task-name ' + (item.done ? 'done' : '') + '" data-item-name="' + itemKey + '" value="' + esc(item.name) + '" style="border:none; background:transparent; padding:2px 0; font-size:13px;">';
        html += '<button class="icon-btn" data-delete-item="' + itemKey + '" aria-label="Hapus item" style="width:20px; height:20px;">' + icon('x', { size: 11 }) + '</button>';
        html += '</div>';
      });
      html += '<div class="row" style="gap:6px; margin-top:2px;">';
      html += '<input data-new-item="' + taskKey + '" placeholder="tambah item..." style="flex:1; height:27px; padding:5px 9px; font-size:12.5px;">';
      html += '<button data-add-item="' + taskKey + '" style="height:27px; padding:0 10px; font-size:12.5px;">Tambah</button>';
      html += '</div></div>';
    }
    html += '</div>';
    return html;
  }

        var stage = project.stages.filter(function(s){ return s.id === parts[0]; })[0];
        var task = stage && stage.tasks.filter(function(t){ return t.id === parts[1]; })[0];
        if (task) { task.items = task.items.filter(function(it){ return it.id !== parts[2]; }); persist(); }
      };
    });
    Array.prototype.forEach.call(document.querySelectorAll('[data-add-item]'), function(el){
      el.onclick = function(){ addItemToTask(el.getAttribute('data-add-item')); };
    });
    Array.prototype.forEach.call(document.querySelectorAll('[data-new-item]'), function(el){
      el.onkeydown = function(e){ if (e.key === 'Enter') addItemToTask(el.getAttribute('data-new-item')); };
    });
  }

  function addItemToTask(taskKey) {
    var input = document.querySelector('[data-new-item="' + taskKey + '"]');
    var name = input ? input.value.trim() : '';
    if (!name) return;
    var parts = taskKey.split('|');
    var project = findProject(state.activeId); if (!project) return;
    var stage = project.stages.filter(function(s){ return s.id === parts[0]; })[0];
    var task = stage && stage.tasks.filter(function(t){ return t.id === parts[1]; })[0];
    if (task) {
      task.items = task.items || [];
      task.items.push({ id: uid('item'), name: name, done: false });
      state.expandedTasks[taskKey] = true;
      persist();
    }
  }

  function addTaskToStage(sid) {
    var input = document.querySelector('[data-new-task="' + sid + '"]');
    var name = input ? input.value.trim() : '';
    if (!name) return;
    var project = findProject(state.activeId); if (!project) return;
    var stage = project.stages.filter(function(s){ return s.id === sid; })[0];
    if (stage) { stage.tasks.push({ id: uid('task'), name: name, done: false, items: [] }); persist(); }
  }

  function updateActiveProject(field, value, silent) {
    var project = findProject(state.activeId); if (!project) return;
    if (project) { project[field] = value; if (silent) persistSilent(); else persist(); }
  }

  function bindIfExists(id, evt, handler) {
    var el = document.getElementById(id);
    if (el) el[evt] = handler;
  }

  // ---------- Export / Import ----------
  function exportData() {
    var blob = new Blob([JSON.stringify(state.projects, null, 2)], { type: 'application/json' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    var dateStr = new Date().toISOString().slice(0, 10);
    a.href = url; a.download = 'tracker-enviro-' + dateStr + '.json';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function importData(file) {
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(e){
      try {
        var data = JSON.parse(e.target.result);
        if (!Array.isArray(data)) throw new Error('format tidak valid');
        data = data.map(safeNormalize).filter(Boolean);
        var merge = confirm('Gabungkan dengan data yang sudah ada? Klik Batal untuk menimpa semua data saat ini.');
        if (merge) {
          var existingIds = state.projects.map(function(p){ return p.id; });
          data.forEach(function(p){ if (existingIds.indexOf(p.id) === -1) state.projects.push(p); });
        } else {
          state.projects = data;
        }
        persist();
        alert('Data berhasil diimpor.');
      } catch (err) {
        alert('Gagal membaca file. Pastikan ini adalah file export dari tracker ini.');
      }
    };
    reader.readAsText(file);
  }

  function recoverData() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY) || localStorage.getItem(OLD_STORAGE_KEY);
      if (!raw) { alert('Tidak ada data tersimpan ditemukan di browser ini.'); return; }

      var parsed;
      try { parsed = JSON.parse(raw); } catch(e) {
        alert('Data di browser rusak / tidak bisa dibaca.\n\nError: ' + e.message);
        return;
      }
      if (!Array.isArray(parsed)) {
        alert('Format data tidak dikenali (bukan array). Coba gunakan tombol Import dari file backup .json.');
        return;
      }
      if (parsed.length === 0) {
        alert('Data di browser kosong (0 proyek).');
        return;
      }

      // Normalize satu per satu
      var recovered = [], failed = [];
      parsed.forEach(function(p, i){
        try { recovered.push(normalizeProject(p)); }
        catch(e) { failed.push('Proyek #' + (i+1) + ' (' + (p && p.name ? p.name : 'tanpa nama') + '): ' + e.message); }
      });

      if (recovered.length === 0) {
        alert('Semua ' + parsed.length + ' proyek gagal dipulihkan.\n\nDetail:\n' + failed.join('\n'));
        return;
      }

      var msg = 'Ditemukan ' + recovered.length + ' proyek di penyimpanan browser ini' +
                (failed.length ? ' (' + failed.length + ' gagal dibaca)' : '') + '.\n\n' +
                'Pilih tindakan:\n' +
                '• OK = Ganti semua data yang tampil sekarang dengan ' + recovered.length + ' proyek dari browser ini\n' +
                '• Batal = Batalkan pulihkan data';

      if (!confirm(msg)) return;

      // Replace penuh dengan data dari localStorage
      state.projects = recovered;
      saveProjects(state.projects);
      // Push ke Gist supaya semua user dapat data yang sama
      schedulePush();
      render();
      alert('Selesai. ' + recovered.length + ' proyek berhasil dipulihkan.' +
            (failed.length ? '\n\n' + failed.length + ' proyek tidak berhasil dibaca:\n' + failed.join('\n') : ''));
    } catch(e) {
      alert('Gagal membaca data dari browser: ' + e.message + '\n\nCoba gunakan tombol Import dari file backup .json jika ada.');
    }
  }

  render();
  if (isConnected()) { pullFromGist({ silent: true }); startPolling(); }
})();
</script>
</body>
</html>
